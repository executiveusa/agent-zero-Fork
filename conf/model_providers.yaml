# Supported model providers for Agent Zero
# ---------------------------------------
#
# Each provider type ("chat", "embedding") contains a mapping of provider IDs
# to their configurations.
#
# The provider ID (e.g., "anthropic") is used:
#  - in the settings UI dropdowns.
#  - to construct the environment variable for the API key (e.g., ANTHROPIC_API_KEY).
#
# Each provider configuration requires:
#   name:             Human-readable name for the UI.
#   litellm_provider: The corresponding provider name in LiteLLM.
#
# Optional fields:
#   kwargs:           A dictionary of extra parameters to pass to LiteLLM.
#                     This is useful for `api_base`, `extra_headers`, etc.

chat:
  a0_venice:
    name: Agent Zero Venice.ai
    litellm_provider: openai
    kwargs:
      api_base: https://api.agent-zero.ai/venice/v1
      venice_parameters:
        include_venice_system_prompt: false
  anthropic:
    name: Anthropic
    litellm_provider: anthropic
  cometapi:
    name: CometAPI
    litellm_provider: cometapi
  deepseek:
    name: DeepSeek
    litellm_provider: deepseek
  github_copilot:
    name: GitHub Copilot
    litellm_provider: github_copilot
    kwargs:
      extra_headers:
        "Editor-Version": "vscode/1.85.1"
        "Copilot-Integration-Id": "vscode-chat"
  google:
    name: Google Gemini
    litellm_provider: gemini
  gemini_cli:
    name: Google Gemini CLI (OAuth)
    litellm_provider: gemini
    kwargs:
      # Requires: gemini-cli login (uses ~/.config/gemini/credentials.json)
      # Free access via Gemini CLI OAuth: https://github.com/google/generative-ai-cli
      vertex_project: auto
      vertex_location: auto
  antigravity:
    name: Google Antigravity (Vertex OAuth)
    litellm_provider: vertex_ai
    kwargs:
      # Requires: gcloud auth application-default login
      # Free access via Antigravity: https://docs.openclaw.ai/concepts/model-providers#google-vertex-antigravity-and-gemini-cli
      vertex_project: auto
      vertex_location: us-central1
  groq:
    name: Groq
    litellm_provider: groq
  huggingface:
    name: HuggingFace
    litellm_provider: huggingface
  lm_studio:
    name: LM Studio
    litellm_provider: lm_studio
  mistral:
    name: Mistral AI
    litellm_provider: mistral
  ollama:
    name: Ollama
    litellm_provider: ollama
  openai:
    name: OpenAI
    litellm_provider: openai
  azure:
    name: OpenAI Azure
    litellm_provider: azure
  openrouter:
    name: OpenRouter
    litellm_provider: openrouter
    kwargs:
      extra_headers:
        "HTTP-Referer": "https://agent-zero.ai/"
        "X-Title": "Agent Zero"
  sambanova:
    name: Sambanova
    litellm_provider: sambanova
  venice:
    name: Venice.ai
    litellm_provider: openai
    kwargs:
      api_base: https://api.venice.ai/api/v1
      venice_parameters:
        include_venice_system_prompt: false
  xai:
    name: xAI
    litellm_provider: xai
  other:
    name: Other OpenAI compatible
    litellm_provider: openai

embedding:
  huggingface:
    name: HuggingFace
    litellm_provider: huggingface
  google:
    name: Google Gemini
    litellm_provider: gemini
  gemini_cli:
    name: Google Gemini CLI (OAuth)
    litellm_provider: gemini
    kwargs:
      vertex_project: auto
      vertex_location: auto
  antigravity:
    name: Google Antigravity (Vertex OAuth)
    litellm_provider: vertex_ai
    kwargs:
      vertex_project: auto
      vertex_location: us-central1
  lm_studio:
    name: LM Studio
    litellm_provider: lm_studio
  mistral:
    name: Mistral AI
    litellm_provider: mistral
  ollama:
    name: Ollama
    litellm_provider: ollama
  openai:
    name: OpenAI
    litellm_provider: openai
  azure:
    name: OpenAI Azure
    litellm_provider: azure
  # TODO: OpenRouter not yet supported by LiteLLM, replace with native litellm_provider openrouter and remove api_base when ready
  openrouter:
    name: OpenRouter
    litellm_provider: openai
    kwargs:
      api_base: https://openrouter.ai/api/v1
      extra_headers:
        "HTTP-Referer": "https://agent-zero.ai/"
        "X-Title": "Agent Zero"
  other:
    name: Other OpenAI compatible
    litellm_provider: openai
