version: '3.8'

services:
  # LiteLLM Proxy Server
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: agent-zero-litellm
    ports:
      - "4000:4000"
    volumes:
      - ./litellm-config.yaml:/app/config.yaml
    environment:
      # Anthropic
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      
      # OpenAI
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      
      # Google/Gemini
      - GEMINI_API_KEY=${GOOGLE_AI_API_KEY}
      - GOOGLE_AI_API_KEY=${GOOGLE_AI_API_KEY}
      
      # GLM / ZhipuAI (智谱AI)
      - ZHIPUAI_API_KEY=${ZHIPUAI_API_KEY}
      - GLM_API_KEY=${ZHIPUAI_API_KEY}
      
      # Replicate
      - REPLICATE_API_KEY=${REPLICATE_API_KEY}
      - REPLICATE_API_TOKEN=${REPLICATE_API_TOKEN}
      
      # Hugging Face
      - HUGGINGFACE_TOKEN=${HUGGINGFACE_TOKEN}
      - HUGGINGFACE_API_KEY=${HUGGINGFACE_TOKEN}
      
      # Database
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - DATABASE_URL=postgresql://agent_zero:${POSTGRES_PASSWORD}@agent-zero-postgres:5432/agent_zero
      
      # LiteLLM Settings
      - LITELLM_MASTER_KEY=agent-zero-master-key
      - LITELLM_SALT_KEY=agent-zero-salt-2026
      - UI_USERNAME=admin
      - UI_PASSWORD=${LITELLM_UI_PASSWORD:-agent-zero-admin}
      
      # Monitoring
      - STORE_MODEL_IN_DB=True
      
    command: --config /app/config.yaml --port 4000 --detailed_debug
    networks:
      - agent-zero_agent-network
    restart: unless-stopped
    labels:
      - "coolify.enabled=true"
      - "coolify.name=litellm"
      - "coolify.http.routers.litellm.rule=Host(`litellm.31.220.58.212.sslip.io`)"
      - "coolify.http.services.litellm.loadbalancer.server.port=4000"

networks:
  agent-zero_agent-network:
    external: true
