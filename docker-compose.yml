version: '3.8'

services:
  # ── Docker MCP Server ────────────────────────────────────────────
  # Scope: Docker socket operations ONLY (start/stop/inspect containers).
  # Inter-agent coordination now goes through the file-backed TaskBoard
  # at /workspace/.task_board.json -- no HTTP round-trip needed.
  docker-mcp-server:
    image: node:20-alpine
    container_name: agent-zero-docker-mcp
    working_dir: /app
    volumes:
      - ./workspace:/workspace
      - ./memory:/memory
      - ./logs:/logs
      - ./mcp-docker-server.js:/app/mcp-docker-server.js
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - AGENT_NAME=Agent_Zero
      - TASK_ID=mcp-server
      - EXECUTION_MODE=daemon
      - TASK_BOARD_PATH=/workspace/.task_board.json
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GH_PAT=${GH_PAT}
      - VERCEL_TOKEN=${VERCEL_TOKEN}
    command: node mcp-docker-server.js
    restart: unless-stopped
    networks:
      - agent-network
    privileged: true
    pid: host

  # ── ClaudeCode ────────────────────────────────────────────────────
  # Long-running development agent.  Coordinates via TaskBoard file;
  # MCP_ENDPOINT kept only for Docker-level operations.
  claude-code:
    image: python:3.11-slim
    container_name: agent-claude-code
    working_dir: /workspace
    volumes:
      - ./workspace:/workspace
      - ./memory:/memory
      - ./logs:/logs
    environment:
      - AGENT_NAME=ClaudeCode
      - TASK_ID=clockcode
      - MODEL=claude-sonnet-4-5-20250929
      - MCP_ENDPOINT=http://docker-mcp-server:3000
      - EXECUTION_MODE=long_run
      - TASK_BOARD_PATH=/workspace/.task_board.json
      - TTS_ENABLED=${TTS_ENABLED:-true}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    command: tail -f /dev/null
    restart: unless-stopped
    networks:
      - agent-network
    depends_on:
      - docker-mcp-server

  # ── Cynthia (Frontend Design) ─────────────────────────────────────
  # Coordinates via TaskBoard.  No MCP_ENDPOINT needed -- design work
  # is file-based (reads/writes workspace/).
  cynthia:
    image: node:20-alpine
    container_name: agent-cynthia
    working_dir: /workspace/design-system
    volumes:
      - ./workspace:/workspace
      - ./memory:/memory
      - ./logs:/logs
      - ./design-system-specification.json:/app/design-system-specification.json
      - ./DESIGN_SYSTEM.md:/app/DESIGN_SYSTEM.md
      - ./COMPONENT_LIBRARY.md:/app/COMPONENT_LIBRARY.md
      - ./TOKEN_REFERENCE.md:/app/TOKEN_REFERENCE.md
      - ./UIUX-REPORT.md:/app/UIUX-REPORT.md
    environment:
      - AGENT_NAME=Cynthia
      - TASK_ID=frontend-design
      - MODEL=claude-sonnet-4-5-20250929
      - EXECUTION_MODE=short_run
      - TASK_BOARD_PATH=/workspace/.task_board.json
      - TTS_ENABLED=${TTS_ENABLED:-true}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    command: tail -f /dev/null
    restart: unless-stopped
    networks:
      - agent-network

  # ── Switchblade (VS Code short-tasks) ─────────────────────────────
  # Needs Docker socket for live container operations -- keeps MCP.
  switchblade:
    image: node:20-alpine
    container_name: agent-switchblade
    working_dir: /workspace
    volumes:
      - ./workspace:/workspace
      - ./memory:/memory
      - ./logs:/logs
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - AGENT_NAME=Switchblade
      - TASK_ID=vscode-agent
      - MODEL=claude-sonnet-4-5-20250929
      - MCP_ENDPOINT=http://docker-mcp-server:3000
      - EXECUTION_MODE=short_run
      - TASK_BOARD_PATH=/workspace/.task_board.json
      - TTS_ENABLED=${TTS_ENABLED:-true}
      - GH_PAT=${GH_PAT}
      - VERCEL_TOKEN=${VERCEL_TOKEN}
    command: tail -f /dev/null
    restart: unless-stopped
    networks:
      - agent-network
    privileged: true
    pid: host
    depends_on:
      - docker-mcp-server

  # ── Browser Agent (Desktop Automation) ────────────────────────────
  # Needs X11 passthrough for Playwright screenshots.  Coordinates via
  # TaskBoard; MCP removed (no Docker ops needed).
  browser-agent:
    image: node:20-alpine
    container_name: agent-browser
    working_dir: /workspace
    volumes:
      - ./workspace:/workspace
      - ./memory:/memory
      - ./logs:/logs
      - /tmp/.X11-unix:/tmp/.X11-unix
    environment:
      - AGENT_NAME=Browser_Agent
      - TASK_ID=desktop-automation
      - MODEL=claude-sonnet-4-5-20250929
      - EXECUTION_MODE=short_run
      - TASK_BOARD_PATH=/workspace/.task_board.json
      - TTS_ENABLED=${TTS_ENABLED:-true}
      - DISPLAY=${DISPLAY}
    command: tail -f /dev/null
    restart: unless-stopped
    networks:
      - agent-network

  # ── ML Agent (GPU Workloads) ───────────────────────────────────────
  # Keeps MCP for potential model-serving operations via Docker.
  # Also on TaskBoard for swarm coordination.
  ml-agent:
    image: nvidia/cuda:12.1.0-runtime-ubuntu22.04
    container_name: agent-ml
    working_dir: /workspace
    volumes:
      - ./workspace:/workspace
      - ./memory:/memory
      - ./logs:/logs
    environment:
      - AGENT_NAME=ML_Agent
      - TASK_ID=machine-learning
      - MODEL=claude-sonnet-4-5-20250929
      - MCP_ENDPOINT=http://docker-mcp-server:3000
      - EXECUTION_MODE=long_run
      - TASK_BOARD_PATH=/workspace/.task_board.json
      - TTS_ENABLED=${TTS_ENABLED:-true}
      - HUGGINGFACE_TOKEN=${HUGGINGFACE_TOKEN}
      - REPLICATE_API_KEY=${REPLICATE_API_KEY}
      - C1_THESIS_API_KEY=${C1_THESIS_API_KEY}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    command: tail -f /dev/null
    restart: unless-stopped
    networks:
      - agent-network
    depends_on:
      - docker-mcp-server

  # GlitchTip - Error monitoring
  glitchtip:
    image: glitchtip/glitchtip:latest
    container_name: agent-zero-glitchtip
    environment:
      - DATABASE_URL=postgres://glitchtip:glitchtip@postgres:5432/glitchtip
    volumes:
      - glitchtip-data:/data
    restart: unless-stopped
    networks:
      - agent-network

  # PostgreSQL - Database for GlitchTip
  postgres:
    image: postgres:15-alpine
    container_name: agent-zero-postgres
    environment:
      - POSTGRES_DB=glitchtip
      - POSTGRES_USER=glitchtip
      - POSTGRES_PASSWORD=glitchtip
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - agent-network

volumes:
  workspace:
  memory:
  logs:
  glitchtip-data:
  postgres-data:

networks:
  agent-network:
    driver: bridge